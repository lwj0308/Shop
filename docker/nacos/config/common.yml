# 公共配置 - 所有微服务共享
# 在Nacos中配置为：Data ID = common.yml, Group = DEFAULT_GROUP
# 这个文件里的配置会被所有微服务共同使用，避免每个服务都重复写一遍

spring:
  # 数据源公共配置（就是连接MySQL数据库的配置）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接地址：用 ${变量名:默认值} 的写法，优先读环境变量，没有就用默认值
    # spring.application.name 会自动替换成当前服务的名字，比如 shop-user 就会连 shop-user 数据库
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${spring.application.name}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      # 连接池最小空闲连接数（最少保持5个连接待命）
      minimum-idle: 5
      # 连接池最大连接数（最多同时20个连接）
      maximum-pool-size: 20
      # 空闲连接存活最大时间（10分钟没人用就回收）
      idle-timeout: 600000
      # 连接最大存活时间（30分钟后强制回收，防止连接老化）
      max-lifetime: 1800000
      # 获取连接超时时间（等30秒还拿不到连接就报错）
      connection-timeout: 30000

  # Redis公共配置（缓存和会话存储）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 5000

# MyBatis-Plus公共配置（ORM框架，用来操作数据库）
mybatis-plus:
  # Mapper XML文件的位置（扫描所有mapper目录下的XML文件）
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      # 主键生成策略：使用雪花算法生成分布式唯一ID（不会重复的数字ID）
      id-type: assign_id
      # 逻辑删除：数据库里不是真删除，而是把deleted字段改成1
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # 下划线转驼峰：数据库的user_name自动映射到Java的userName
    map-underscore-to-camel-case: true
    # 开发环境打印SQL：控制台能看到实际执行的SQL语句，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token公共配置（登录认证框架）
sa-token:
  # token名称（前端请求头里传这个名字）
  token-name: Authorization
  # AccessToken有效期2小时（单位：秒），过期后需要重新登录
  timeout: 7200
  # 临时有效期：-1表示不限制，只要没过期就一直有效
  active-timeout: -1
  # 是否允许同一账号多地同时登录（比如手机和电脑同时在线）
  is-concurrent: true
  # 多人登录同一账号时，是否共用同一个token
  is-share: true
  # token风格：uuid是一串随机字符串
  token-style: uuid
  # 是否输出操作日志（生产环境建议关闭）
  is-log: false

# 日志配置
logging:
  level:
    # 我们项目的日志级别设为debug，开发时能看到详细信息
    com.shop: debug
    # Spring Cloud的日志级别设为info，减少无关输出
    org.springframework.cloud: info
