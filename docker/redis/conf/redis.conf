# ============================================
# Redis 自定义配置文件
# 说明：开发环境配置，生产环境需要设置密码和更严格的策略
# ============================================

# 绑定地址（允许所有连接，开发环境方便）
bind 0.0.0.0

# 端口
port 6379

# 密码（开发环境不设密码，生产环境务必设置）
# requirepass your_password

# 持久化方式：RDB 快照
# 900秒内至少有1个key变化就保存
save 900 1
# 300秒内至少有10个key变化就保存
save 300 10
# 60秒内至少有10000个key变化就保存
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 数据目录
dir /data

# 开启 AOF 持久化（双重保障，RDB + AOF）
appendonly yes
appendfilename "appendonly.aof"
# 每秒同步一次，平衡性能和数据安全
appendfsync everysec

# 最大内存（开发环境 256MB 足够）
maxmemory 256mb

# 内存淘汰策略：LRU 淘汰最少使用的 key
maxmemory-policy allkeys-lru

# 关闭保护模式（开发环境允许外部连接）
protected-mode no
