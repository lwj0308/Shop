# ============================================
# RocketMQ Broker 自定义配置文件
# 说明：开发环境配置，允许自动创建 Topic 方便调试
# ============================================

# Broker 集群名称（同一集群内的 Broker 名称相同）
brokerClusterName=ShopCluster

# Broker 名称（主从模式下，主从使用相同名称）
brokerName=broker-a

# Broker ID（0 表示主节点，大于0表示从节点）
brokerId=0

# NameServer 地址（通过环境变量注入，这里留空由启动命令指定）
# namesrvAddr=rocketmq-namesrv:9876

# Broker 对外服务的监听端口
listenPort=10911

# 允许自动创建 Topic（开发环境开启，生产环境建议关闭）
autoCreateTopicEnable=true

# 允许自动创建订阅组（开发环境开启，生产环境建议关闭）
autoCreateSubscriptionGroup=true

# 删除过期日志文件的时间（默认凌晨4点）
deleteWhen=04

# 日志保留时间（小时），48小时后自动清理
fileReservedTime=48

# 存储路径
storePathRootDir=/home/rocketmq/store
storePathCommitLog=/home/rocketmq/store/commitlog

# 发送消息超时时间（毫秒）
sendMessageTimeout=3000
